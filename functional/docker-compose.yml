services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-kritsky}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kritsky}",
        ]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NITRO_STORAGE_CACHE: redis://redis-cache:6379/0
      NUXT_API_BACKEND_BASE: http://backend:8000
      NUXT_API_BACKEND_URL: http://backend:8000/api
      NUXT_PUBLIC_API_BASE: /api
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-change-me-to-random-string}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - default
      - app-network

  redis-cache:
    image: redis:7-alpine
    container_name: kritsky-redis-cache
    restart: unless-stopped
    volumes:
      - redis_cache_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminka:
    build:
      context: ./adminka
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /adminka
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-admin@kritsky.local}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-admin@kritsky.local}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  redis_cache_data:
  postgres_data:
  redis_data:
